services:
  app:
    build: .
    command: sh -c "pnpm prisma migrate deploy && pnpm start"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://impostor:impostor@db:5432/impostor
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: impostor
      POSTGRES_USER: impostor
      POSTGRES_PASSWORD: impostor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U impostor -d impostor"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
