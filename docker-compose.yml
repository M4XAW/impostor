services:
  app:
    build: .
    command: sh -c "pnpm prisma migrate deploy && pnpm start"
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - "3000:3000"
    environment:
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgresql://impostor:${POSTGRES_PASSWORD:-impostor}@db:5432/impostor
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(response => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: impostor
      POSTGRES_USER: impostor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-impostor}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U impostor -d impostor"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
